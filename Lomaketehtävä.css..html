<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact & Feedback Form</title>
      <link rel="stylesheet" href="CSS/common.css">
  <link rel="stylesheet" href="CSS/lomake.css">
</head>
    

<body>

<form class="form-container">

    <fieldset>
        <legend>Contact information</legend>

        <div class="form-row">
            <label for="first-name">First name:</label>
            <input type="text" id="first-name" name="first-name">
        </div>
        <div class="form-row">
            <label for="last-name">Last name:</label>
            <input type="text" id="last-name" name="last-name">
        </div>

        <div class="form-row">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </div>
        <div class="form-row">
            <label for="telephone">Telephone:</label>
            <input type="tel" id="telephone" name="telephone">
        </div>
        <div class="form-row">
            <span>Preferred contact method:</span>
            <label><input type="checkbox" name="preferred-contact" value="email"> Email</label>
            <label><input type="checkbox" name="preferred-contact" value="telephone"> Telephone</label>
        </div>
    </fieldset>

    <fieldset>
        <legend>Feedback</legend>

        <div class="form-row">
            <label for="subject">Message subject:</label>
            <input type="text" id="subject" name="subject">
        </div>

        <div class="form-row">
            <label for="message">Feedback:</label>
            <textarea id="message" name="message"></textarea>
        </div>

         <div class="form-row">
            <label for="file">Attach a file:</label>
            <input type="file" id="file" name="file">
         </div>

         <div class="form-row">¨
            <button type="submit">Send</button>
         </div>

    </fieldset>
</form>
</body>
</html>
